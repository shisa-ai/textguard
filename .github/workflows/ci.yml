name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --exclude-newer P7D --frozen --dev

      - name: Lint with ruff
        run: uv run ruff check src/ tests/ scripts/

      - name: Type check with mypy
        run: uv run mypy src/textguard/

      - name: Run tests
        run: uv run pytest -q

      - name: Build package
        run: uv run python -m build

      - name: Smoke test installed wheel
        run: |
          uv run python -m venv .wheel-smoke
          . .wheel-smoke/bin/activate
          pip install dist/textguard-*.whl
          python - <<'PY'
          import textguard
          from importlib import resources

          result = textguard.scan("hi")
          assert result.decoded_text == "hi"

          package_root = resources.files("textguard")
          required = (
              ("data", "scripts.json"),
              ("data", "confusables.json"),
              ("data", "confusables_full.json"),
              ("data", "allowed_signers"),
              ("data", "rules", "prompt_injection_direct.yara"),
          )
          for parts in required:
              path = package_root
              for part in parts:
                  path = path.joinpath(part)
              assert path.is_file(), parts
          PY

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/dependency-review-action@56339e523c0409420f6c2c9a2f4292bbb3c07dd3 # v4.8.0
