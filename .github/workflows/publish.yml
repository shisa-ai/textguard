name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Extract version metadata
        id: meta
        run: |
          version="$(uv run python -c 'import textguard; print(textguard.__version__)')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          expected="v${RELEASE_VERSION}"
          if [ "${RELEASE_TAG}" != "${expected}" ]; then
            echo "::error::Tag '${RELEASE_TAG}' does not match package version '${expected}'"
            exit 1
          fi

      - name: Verify lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --exclude-newer P7D --frozen --dev

      - name: Run release validation
        run: |
          uv run ruff check src/ tests/ scripts/
          uv run mypy src/textguard/
          uv run pytest -q

      - name: Remove stale build artifacts
        run: rm -rf dist/

      - name: Build
        run: uv build

      - name: Verify package metadata
        run: uvx --from twine twine check dist/*

      - name: Audit dependencies for known vulnerabilities
        run: uvx pip-audit --require-hashes --disable-pip -r <(uv export --all-groups --frozen --format requirements.txt --no-emit-project)

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: sbom-textguard-${{ steps.meta.outputs.version }}
          output-file: dist/sbom-textguard-${{ steps.meta.outputs.version }}.spdx.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: |
            dist/textguard-*.whl
            dist/textguard-*.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi-publish
    permissions:
      id-token: write
      contents: read
      attestations: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/textguard-*.whl

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
