name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Extract version metadata
        id: meta
        run: |
          version="$(uv run python -c 'import textguard; print(textguard.__version__)')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          expected="v${RELEASE_VERSION}"
          if [ "${RELEASE_TAG}" != "${expected}" ]; then
            echo "::error::Tag '${RELEASE_TAG}' does not match package version '${expected}'"
            exit 1
          fi

      - name: Verify lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --exclude-newer P7D --frozen --dev

      - name: Run release validation
        run: |
          uv run ruff check src/ tests/ scripts/
          uv run mypy src/textguard/
          uv run pytest -q

      - name: Remove stale build artifacts
        run: rm -rf dist/

      - name: Build
        run: uv build

      - name: Verify package metadata
        run: uvx --from twine twine check dist/*

      - name: Audit dependencies for known vulnerabilities
        run: uvx pip-audit --require-hashes --disable-pip -r <(uv export --all-groups --frozen --format requirements.txt --no-emit-project)

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: sbom-textguard-${{ steps.meta.outputs.version }}
          output-file: dist/sbom-textguard-${{ steps.meta.outputs.version }}.spdx.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: |
            dist/textguard-*.whl
            dist/textguard-*.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi-publish
    permissions:
      id-token: write
      contents: read
      attestations: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/textguard-*.whl

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
